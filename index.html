<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#070d1a; }
  body { font-family:'Noto Sans','Noto Sans Devanagari',sans-serif; -webkit-font-smoothing:antialiased; }
  #root { min-height:100vh; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:#0e1625; }
  ::-webkit-scrollbar-thumb { background:#1a2840; border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:#27406b; }
  input::placeholder, textarea::placeholder { color:#5a7090; opacity:0.8; }
  button { font-family:inherit; }
  #loading-screen {
    position:fixed; inset:0; background:#070d1a; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; z-index:9999;
  }
  #loading-screen .mark {
    width:52px; height:52px; border-radius:14px;
    background:linear-gradient(135deg,#00c9ff,#7c3aed);
    display:flex; align-items:center; justify-content:center; font-size:24px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  #loading-screen .label { color:#5a7090; font-size:13px; font-weight:600; letter-spacing:0.5px; }
  @keyframes pulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.08); opacity:0.85; } }
  #error-screen {
    position:fixed; inset:0; background:#070d1a; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; z-index:10000; padding:30px; text-align:center;
  }
  #error-screen.show { display:flex; }
  #error-screen .icon { font-size:36px; }
  #error-screen .title { color:#ff4444; font-weight:800; font-size:18px; }
  #error-screen .msg { color:#5a7090; font-size:13px; max-width:600px; line-height:1.6; white-space:pre-wrap; text-align:left; background:#131e30; border:1px solid #1a2840; border-radius:10px; padding:16px; font-family:monospace; }
  #error-screen .hint { color:#e8f0fe; font-size:13px; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="mark">⬡</div>
  <div class="label">Loading ShopOS…</div>
</div>
<div id="error-screen">
  <div class="icon">⚠️</div>
  <div class="title">ShopOS couldn't start</div>
  <div class="hint">Open the browser console (F12 → Console tab) for full details. Common fix: hard-refresh the page (Ctrl+Shift+R), since this checks an internet connection to load React from a CDN.</div>
  <div class="msg" id="error-detail"></div>
</div>
<div id="root"></div>

<script>
  window.addEventListener('error', function(e) {
    const loading = document.getElementById('loading-screen');
    const errBox = document.getElementById('error-screen');
    const detail = document.getElementById('error-detail');
    if (loading) loading.style.display = 'none';
    if (errBox) errBox.classList.add('show');
    if (detail) detail.textContent = (e.message || 'Unknown error') + '\n' + (e.filename ? ('in ' + e.filename + ':' + e.lineno) : '');
  });
  setTimeout(function() {
    const root = document.getElementById('root');
    const loading = document.getElementById('loading-screen');
    if (root && root.children.length === 0 && loading && loading.style.display !== 'none') {
      loading.style.display = 'none';
      const errBox = document.getElementById('error-screen');
      const detail = document.getElementById('error-detail');
      if (errBox) errBox.classList.add('show');
      if (detail) detail.textContent = 'App did not start within 12 seconds.\nThis usually means React, ReactDOM, or Babel could not load from unpkg.com — check your internet connection or try a different network (some networks/firewalls block CDN scripts).';
    }
  }, 12000);
</script>

function Input({value,onChange,placeholder,type="text",style={}}){
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder}
    style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,color:C.text,padding:"9px 13px",borderRadius:8,fontSize:13,boxSizing:"border-box",fontFamily:"inherit",outline:"none",...style}}/>;
}
function Btn({onClick,children,variant="primary",style={}}){
  const base={border:"none",padding:"9px 18px",borderRadius:9,fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"};
  const v={
    primary:{background:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"#fff"},
    green:{background:C.green,color:"#000"},ghost:{background:C.border,color:C.text},
    wa:{background:"#25D366",color:"#fff"},gold:{background:`linear-gradient(135deg,${C.gold},#d97706)`,color:"#fff"},
    red:{background:C.red,color:"#fff"},
  };
  return <button onClick={onClick} style={{...base,...(v[variant]||v.primary),...style}}>{children}</button>;
}

function AuthScreen({mode,onSuccess,onBack}){
  const {lang}=useLang(); const t=T[lang];
  const [form,setForm]=useState({email:"",password:"",shopName:"",phone:"",confirmPass:"",plan:"pro"});

  const isLogin=mode==="login"; const set=k=>e=>setForm({...form,[k]:e.target.value});

function QRPay({user,onUpgrade}){
  const {lang}=useLang(); const t=T[lang];
  const [qrId,setQrId]=useState("9800000000"); const [amount,setAmount]=useState(""); const [note,setNote]=useState(""); const [shown,setShown]=useState(false);
  const cells=19;
  const qrGrid=shown?Array.from({length:cells*cells},(_,i)=>{
    const r=Math.floor(i/cells),c_=i%cells;
    const seed=(qrId+amount).split("").reduce((a,ch)=>a+ch.charCodeAt(0),42);
    const isCorner=(r<6&&c_<6)||(r<6&&c_>=cells-6)||(r>=cells-6&&c_<6);
    return isCorner||((r+c_+seed)%3===0)||((r*c_+seed)%5===0);
  }):null;
  return(
    <div>
      <TrialBanner user={user} onUpgrade={onUpgrade}/>
      <div style={{marginBottom:18}}><h2 style={{margin:0,fontSize:22,fontWeight:900}}>💳 {t.qrTitle}</h2><p style={{margin:"4px 0 0",color:C.muted,fontSize:13}}>{t.qrSubtitle}</p></div>

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:22}}>
          <div style={{fontWeight:700,marginBottom:16}}>{lang==="en"?"Generate QR":"QR बनाउनुहोस्"}</div>
          {[[t.upiLabel,qrId,setQrId,"FonePay number"],[t.amountOptional,amount,setAmount,t.enterAmount],[t.noteLabel,note,setNote,"Invoice #001"]].map(([l,v,sv,ph],i)=>(
            <div key={i} style={{marginBottom:12}}><div style={{color:C.muted,fontSize:11,marginBottom:5}}>{l}</div><Input value={v} onChange={e=>sv(e.target.value)} placeholder={ph}/></div>
          ))}
          <Btn onClick={()=>{if(qrId)setShown(true);}} style={{width:"100%"}}>{t.generateBtn}</Btn>
          <div style={{marginTop:16,padding:14,background:C.surface,borderRadius:10}}>
            <div style={{fontSize:12,color:C.muted,marginBottom:8,fontWeight:700}}>{lang==="en"?"Supported payment apps:":"सपोर्टेड ऐप्स:"}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {["eSewa","Khalti","FonePay","IME Pay","ConnectIPS"].map(a=><span key={a} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600}}>{a}</span>)}
            </div>
          </div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:22,display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{fontWeight:700,marginBottom:18}}>{t.paymentQR}</div>
          {!shown&&<div style={{width:170,height:170,background:C.surface,border:`2px dashed ${C.border}`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:12,textAlign:"center",padding:18}}>{lang==="en"?"QR will appear here":"QR यहाँ देखिनेछ"}</div>}
          {shown&&<div style={{background:"#fff",padding:12,borderRadius:10}}>
            <div style={{display:"grid",gridTemplateColumns:`repeat(${cells},8px)`,gap:1}}>
              {qrGrid.map((filled,i)=><div key={i} style={{width:8,height:8,background:filled?"#000":"#fff",borderRadius:filled?1:0}}/>)}
            </div>
          </div>}
          {shown&&amount&&<div style={{marginTop:14,fontWeight:800,fontSize:18,color:C.green}}>रू {amount}</div>}
          {shown&&<div style={{marginTop:6,color:C.muted,fontSize:11,textAlign:"center"}}>{t.scanHint}</div>}
          {shown&&<div style={{display:"flex",gap:9,marginTop:14}}>

            <Btn variant="ghost" style={{fontSize:11,padding:"7px 14px"}}>{t.printBtn}</Btn>
          </div>}
        </div>
      </div>
    </div>
  );
}

          <Stat label={lang==="en"?"In Trial":"ट्रायलमा"} value={trials.length} change={lang==="en"?"Convert before expiry":"म्याद अघि कन्भर्ट"} color={C.gold} icon="⏳"/>
          <Stat label={lang==="en"?"Potential MRR":"सम्भावित आम्दानी"} value={`रू ${potential.toLocaleString()}`} change={lang==="en"?"If all trials convert":"सबै कन्भर्ट भए"} color={C.purple} icon="📈"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:16}}>
          <div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",marginBottom:14}}>
              <div style={{padding:"13px 18px",borderBottom:`1px solid ${C.border}`,fontWeight:700,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>🏪 {lang==="en"?"All Shops":"सबै पसलहरू"} ({shops.length})</span>
                <Btn variant="primary" style={{fontSize:11,padding:"5px 13px"}}>+ {lang==="en"?"Add Shop":"पसल थप्नुहोस्"}</Btn>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",padding:"9px 18px",borderBottom:`1px solid ${C.border}`}}>
                {[lang==="en"?"Shop":"पसल",lang==="en"?"Plan":"योजना",lang==="en"?"Status":"स्थिति",lang==="en"?"Revenue":"आम्दानी",lang==="en"?"Action":"कार्य"].map(h=><div key={h} style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>{h}</div>)}
              </div>
              {shops.map((sh,i)=>(
                <div key={sh.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",padding:"12px 18px",borderBottom:i<shops.length-1?`1px solid ${C.border}`:"none",alignItems:"center"}}>
                  <div><div style={{fontWeight:600,fontSize:13}}>{lang==="en"?sh.en:sh.np}</div><div style={{color:C.muted,fontSize:11}}>{lang==="en"?sh.owEn:sh.owNp} · {sh.phone}</div></div>
                  <div style={{fontSize:12,fontWeight:700,color:sh.plan==="ultimate"?C.purple:sh.plan==="pro"?C.accent:C.muted,textTransform:"uppercase"}}>{sh.plan}</div>
                  <div><Badge status={sh.status}/></div>
                  <div style={{fontWeight:700,fontSize:13,color:sh.revenue>0?C.green:C.muted}}>
                    {sh.revenue>0?`रू${sh.revenue}`:(sh.daysLeft>0?(lang==="en"?`${sh.daysLeft}d left`:`${sh.daysLeft} दिन`):lang==="en"?"Expired":"समाप्त")}
                  </div>
                  <div>
                    <a href={`https://wa.me/${sh.phone.replace(/\D/g,"")}`} target="_blank" rel="noopener noreferrer"
                      style={{background:"#25D366",color:"#fff",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:10,fontWeight:700,textDecoration:"none"}}>💬 WA</a>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
              <div style={{fontWeight:700,marginBottom:14}}>💹 {lang==="en"?"Revenue Breakdown":"आम्दानी विवरण"}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:13}}>
                {[{lEn:"Basic (रू399)",lNp:"बेसिक (रू३९९)",cnt:active.filter(s=>s.plan==="basic").length,c:C.muted},{lEn:"Pro (रू799)",lNp:"प्रो (रू७९९)",cnt:active.filter(s=>s.plan==="pro").length,c:C.accent},{lEn:"Ultimate (रू1499)",lNp:"अल्टिमेट (रू१४९९)",cnt:active.filter(s=>s.plan==="ultimate").length,c:C.purple}].map((r,i)=>(
                  <div key={i} style={{background:C.surface,borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
                    <div style={{fontSize:28,fontWeight:900,color:r.c}}>{r.cnt}</div>
                    <div style={{color:C.muted,fontSize:11,marginTop:3}}>{lang==="en"?r.lEn:r.lNp}</div>
                  </div>
                ))}
              </div>
              <div style={{padding:"12px 16px",background:`${C.green}15`,border:`1px solid ${C.green}30`,borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontWeight:700}}>💰 {lang==="en"?"Monthly Revenue":"मासिक आम्दानी"}</span>
                <span style={{fontWeight:900,fontSize:20,color:C.green}}>रू {mrr.toLocaleString()}</span>
              </div>
              <div style={{padding:"12px 16px",background:`${C.gold}12`,border:`1px solid ${C.gold}30`,borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:700}}>📈 {lang==="en"?"Annual Projection":"वार्षिक अनुमान"}</span>
                <span style={{fontWeight:900,fontSize:20,color:C.gold}}>रू {(mrr*12).toLocaleString()}</span>
              </div>
            </div>
          </div>
          <div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",marginBottom:13}}>
              <div style={{padding:"13px 18px",borderBottom:`1px solid ${C.border}`,fontWeight:700}}>
                💬 {lang==="en"?"Sales Message Templates":"बिक्री सन्देश टेम्प्लेट"}
              </div>
              {pitches.map((p,i)=>(
                <div key={i} onClick={()=>setSelPitch(i)} style={{padding:"11px 16px",cursor:"pointer",background:selPitch===i?`${C.accent}12`:C.surface,borderBottom:`1px solid ${C.border}`}}>
                  <div style={{fontWeight:700,fontSize:13,color:selPitch===i?C.accent:C.text}}>{lang==="en"?p.titleEn:p.titleNp}</div>
                </div>
              ))}
              <div style={{padding:16}}>
                <div style={{background:C.surface,borderRadius:10,padding:14,fontSize:12,lineHeight:1.8,color:C.muted,whiteSpace:"pre-wrap",maxHeight:200,overflowY:"auto",marginBottom:12}}>
                  {lang==="en"?pitches[selPitch].textEn:pitches[selPitch].textNp}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <Btn variant="wa" style={{flex:1,fontSize:11}}>💬 {lang==="en"?"Send via WhatsApp":"WhatsApp मा पठाउनुहोस्"}</Btn>
                  <Btn variant="ghost" style={{fontSize:11,padding:"9px 12px"}}>📋</Btn>
                </div>
              </div>
            </div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18}}>
              <div style={{fontWeight:700,marginBottom:13}}>✅ {lang==="en"?"Seller Checklist":"विक्रेता चेकलिस्ट"}</div>
              {checklist.map((item,i)=>(
                <div key={i} style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
                  <div style={{width:20,height:20,borderRadius:5,background:item.done?C.green:`${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}>{item.done?"✓":""}</div>
                  <span style={{fontSize:12,color:item.done?C.text:C.muted,textDecoration:item.done?"line-through":"none"}}>{lang==="en"?item.en:item.np}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const NAV_ITEMS=[
  {id:"dashboard",icon:"⬡",en:"Dashboard",np:"ड्यासबोर्ड"},
  {id:"inventory",icon:"📦",en:"Inventory",np:"स्टक"},
  {id:"billing",icon:"🧾",en:"Billing",np:"बिलिङ"},
  {id:"payments",icon:"💳",en:"QR Pay",np:"QR भुक्तानी"},
  {id:"reports",icon:"📊",en:"Reports",np:"रिपोर्ट"},
  {id:"customers",icon:"👥",en:"Customers",np:"ग्राहक"},
  {id:"whatsapp",icon:"💬",en:"WhatsApp",np:"WhatsApp"},
  {id:"catalog",icon:"🌐",en:"Catalog",np:"सूची"},
  {id:"maps",icon:"📍",en:"Maps",np:"म्याप्स"},
  {id:"social",icon:"📱",en:"Social",np:"सोसल"},
];
const PAGE_MAP={dashboard:Dashboard,inventory:Inventory,billing:Billing,payments:QRPay,reports:Reports,customers:Customers,whatsapp:WhatsApp,catalog:Catalog,maps:GoogleMaps,social:SocialMedia};

function App({user,onLogout,onSeller}){
  const {lang,setLang}=useLang();
  const [page,setPage]=useState("dashboard");
  const [collapsed,setCollapsed]=useState(false);
  const [showUpgrade,setShowUpgrade]=useState(false);
  const [currentUser,setCurrentUser]=useState(user);
  const Page=PAGE_MAP[page];
  const nav=NAV_ITEMS.find(n=>n.id===page);
  return(
    <div style={{display:"flex",height:"100vh",background:C.bg,fontFamily:"'Segoe UI','Noto Sans Devanagari',sans-serif",color:C.text}}>
      {showUpgrade&&<UpgradeModal onClose={()=>setShowUpgrade(false)} onUpgrade={plan=>{setCurrentUser({...currentUser,plan:"pro",trialDays:0});setShowUpgrade(false);}}/>}
      <div style={{width:collapsed?62:220,minWidth:collapsed?62:220,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",transition:"width 0.2s,min-width 0.2s",overflow:"hidden"}}>
        <div style={{padding:"15px 11px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.accent},${C.purple})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>⬡</div>
          {!collapsed&&<div><div style={{fontWeight:900,fontSize:15,letterSpacing:-0.5}}>ShopOS</div><div style={{color:C.muted,fontSize:9,fontWeight:700}}>{lang==="en"?"BUSINESS MANAGER":"व्यापार व्यवस्थापक"}</div></div>}
          <button onClick={()=>setCollapsed(!collapsed)} style={{marginLeft:"auto",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,flexShrink:0}}>{collapsed?"▶":"◀"}</button>
        </div>
        <nav style={{flex:1,padding:"8px 5px",overflowY:"auto"}}>
          {NAV_ITEMS.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"8px 9px",borderRadius:8,marginBottom:1,background:page===n.id?`${C.accent}18`:"transparent",border:page===n.id?`1px solid ${C.accent}40`:"1px solid transparent",color:page===n.id?C.accent:C.muted,cursor:"pointer",textAlign:"left",fontSize:12,fontWeight:page===n.id?700:500,whiteSpace:"nowrap",overflow:"hidden",fontFamily:"inherit"}}>
              <span style={{fontSize:15,flexShrink:0}}>{n.icon}</span>
              {!collapsed&&(lang==="en"?n.en:n.np)}
            </button>
          ))}
        </nav>
        {!collapsed&&(
          <>
            <div style={{padding:"0 6px 7px"}}>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,display:"flex",overflow:"hidden"}}>
                {["en","np"].map(l=><button key={l} onClick={()=>setLang(l)} style={{flex:1,background:lang===l?C.accent:"transparent",color:lang===l?"#000":C.muted,border:"none",padding:"7px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>{l==="en"?"EN":"NP"}</button>)}
              </div>
            </div>
            <div style={{padding:"0 6px 11px"}}>
              {currentUser?.plan==="trial"?(
                <div onClick={()=>setShowUpgrade(true)} style={{padding:10,background:`${C.gold}15`,border:`1px solid ${C.gold}35`,borderRadius:10,marginBottom:7,cursor:"pointer"}}>
                  <div style={{color:C.gold,fontSize:10,fontWeight:700,marginBottom:1}}>⏳ {lang==="en"?"FREE TRIAL":"नि:शुल्क ट्रायल"}</div>
                  <div style={{fontSize:10,color:C.muted}}>{currentUser.trialDays} {lang==="en"?"days left":"दिन बाँकी"}</div>
                </div>
              ):(
                <div style={{padding:10,background:`${C.accent}10`,border:`1px solid ${C.accent}28`,borderRadius:10,marginBottom:7}}>
                  <div style={{color:C.accent,fontSize:10,fontWeight:700,marginBottom:1}}>✅ {lang==="en"?"PRO ACTIVE":"PRO सक्रिय"}</div>
                  <div style={{fontSize:10,color:C.muted}}>{lang==="en"?"All features enabled":"सबै सुविधाहरू"}</div>
                </div>
              )}
              <button onClick={onSeller} style={{width:"100%",background:`${C.gold}18`,border:`1px solid ${C.gold}35`,color:C.gold,padding:"7px",borderRadius:8,cursor:"pointer",fontSize:10,fontFamily:"inherit",fontWeight:700,marginBottom:6}}>
                👑 {lang==="en"?"Seller Panel":"विक्रेता प्यानल"}
              </button>
              <button onClick={onLogout} style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,color:C.muted,padding:"6px",borderRadius:8,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                🚪 {lang==="en"?"Logout":"लगआउट"}
              </button>
            </div>
          </>
        )}
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        <div style={{position:"sticky",top:0,zIndex:10,background:C.bg+"ee",backdropFilter:"blur(10px)",borderBottom:`1px solid ${C.border}`,padding:"10px 22px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontWeight:700,fontSize:14}}>{nav?.icon} {lang==="en"?nav?.en:nav?.np}</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {currentUser?.plan==="trial"&&<Btn onClick={()=>setShowUpgrade(true)} variant="gold" style={{fontSize:11,padding:"6px 14px"}}>⚡ {lang==="en"?"Upgrade":"अपग्रेड"} ({currentUser.trialDays}d)</Btn>}
            <div style={{display:"flex",alignItems:"center",gap:7,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 11px"}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.purple})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900}}>{(currentUser?.shopName||"S")[0].toUpperCase()}</div>
              <span style={{fontSize:12,fontWeight:600}}>{currentUser?.shopName||"पसल"}</span>
            </div>
          </div>
        </div>
        <div style={{maxWidth:1080,margin:"0 auto",padding:"20px 22px"}}>
          <Page user={currentUser} onUpgrade={()=>setShowUpgrade(true)}/>
        </div>
      </div>
    </div>
  );
}

function ShopOSRoot(){
  const [lang,setLang]=useState("np");
  const [screen,setScreen]=useState("landing");
  const [user,setUser]=useState(null);
  return(
    <LangCtx.Provider value={{lang,setLang}}>
      {screen==="landing"&&<Landing onLogin={()=>setScreen("login")} onSignup={()=>setScreen("signup")} onDemo={()=>{setUser({shopName:"Demo Shop",email:"demo@shopos.com",plan:"pro",trialDays:0});setScreen("app");}}/>}
      {(screen==="login"||screen==="signup")&&<AuthScreen mode={screen} onSuccess={u=>{setUser(u);setScreen("app");}} onBack={()=>setScreen("landing")}/>}
      {screen==="app"&&<App user={user} onLogout={()=>{setUser(null);setScreen("landing");}} onSeller={()=>setScreen("seller")}/>}
      {screen==="seller"&&<SellerDashboard onBack={()=>setScreen("app")}/>}
    </LangCtx.Provider>
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<ShopOSRoot />);
  const loadingScreen = document.getElementById("loading-screen");
  if (loadingScreen) loadingScreen.remove();
} catch (err) {
  console.error(err);
  const loading = document.getElementById('loading-screen');
  const errBox = document.getElementById('error-screen');
  const detail = document.getElementById('error-detail');
  if (loading) loading.style.display = 'none';
  if (errBox) errBox.classList.add('show');
  if (detail) detail.textContent = String(err && err.stack ? err.stack : err);
}
</script>

</body>
</html>
